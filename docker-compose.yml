version: "3.9"

# ============================================================
# PhoenixKey Database — Production Stack
#
# Trước khi chạy:   cp .env.example .env && chmod 600 .env
# Chạy full stack:  docker compose up -d
# Chỉ infra:        docker compose up -d postgres redis
# Build lại app:    docker compose build app
# Xem logs:         docker compose logs -f app
# Reset toàn bộ:    docker compose down -v
#
# Vault: Dùng HCP Vault (cloud) — xem .env.example
# ============================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  # ──────────────────────────────────────────────────────────
  # PostgreSQL 16 — ACID Database cho PhoenixKey
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: phoenixkey-db-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-phoenixkey}
      POSTGRES_USER: ${DB_USERNAME:-phoenixkey}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      TZ: UTC
    ports:
      # Bind vào 127.0.0.1 → không expose ra internet, chỉ truy cập qua SSH tunnel
      - "${POSTGRES_BIND:-127.0.0.1}:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-phoenixkey} -d ${POSTGRES_DB:-phoenixkey}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c max_connections=${POSTGRES_MAX_CONNECTIONS:-100}
        -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}
        -c effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-512MB}
        -c maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}
        -c work_mem=${POSTGRES_WORK_MEM:-16MB}
        -c log_min_duration_statement=${POSTGRES_LOG_MIN_DURATION:-200ms}
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEM_LIMIT:-2G}
    logging: *default-logging

  # ──────────────────────────────────────────────────────────
  # Redis 7 — Cache cho OTP, Session, Rate Limit
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: phoenixkey-db-redis
    restart: unless-stopped
    environment:
      TZ: UTC
    ports:
      - "${REDIS_BIND:-127.0.0.1}:6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
        --save 900 1
        --save 300 10
        --maxmemory ${REDIS_MAXMEMORY:-256mb}
        --maxmemory-policy allkeys-lru
        --appendonly no
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM_LIMIT:-512M}
    logging: *default-logging

  # ──────────────────────────────────────────────────────────
  # Spring Boot App — PhoenixKey Database Service
  # Port 8080: API (context-path /api/v1) + Actuator (/api/v1/actuator/*)
  # ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phoenixkey-db-spring-app
    restart: unless-stopped
    ports:
      - "${APP_BIND:-0.0.0.0}:${APP_PORT:-8080}:8080"
    env_file:
      - path: .env
        required: true
    environment:
      # Override: service name thay vì localhost trong Docker network
      DB_HOST: postgres
      REDIS_HOST: redis
      # host.docker.internal cho dev local; prod nên dùng HCP Vault URL qua VAULT_ADDR
      VAULT_ADDR: ${VAULT_ADDR:-http://host.docker.internal:8200}
      TZ: UTC
    extra_hosts:
      # Cho phép container truy cập host machine (dev local Vault) trên Linux
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: ${APP_MEM_LIMIT:-2G}
    logging: *default-logging

# ──────────────────────────────────────────────────────────
# Persistent Volumes
# ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ──────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────
networks:
  default:
    name: phoenixkey-db-network
    driver: bridge
