version: "3.9"

# ============================================================
# PhoenixKey Database — Local Development Stack
#
# Chạy: docker compose up -d
# Dừng: docker compose down
# Reset data: docker compose down -v
#
# Vault: Dùng HCP Vault (cloud) — xem .env.example
# ============================================================

services:
  # ──────────────────────────────────────────────────────────
  # PostgreSQL 16 — ACID Database cho PhoenixKey
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: phoenixkey-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: phoenixkey
      POSTGRES_USER: phoenixkey
      POSTGRES_PASSWORD: phoenixkey_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U phoenixkey -d phoenixkey" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres -c max_connections=100 -c shared_buffers=256MB -c effective_cache_size=512MB -c maintenance_work_mem=64MB -c work_mem=16MB -c log_min_duration_statement=200ms -c log_connections=on -c log_disconnections=on

  # ──────────────────────────────────────────────────────────
  # Redis 7 — Cache cho OTP, Session, Rate Limit
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: phoenixkey-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server --save 900 1 --save 300 10 --save 60 10000 --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly no
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

# ──────────────────────────────────────────────────────────
# Persistent Volumes
# ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ──────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────
networks:
  default:
    name: phoenixkey-network
    driver: bridge
