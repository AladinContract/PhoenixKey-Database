# ============================================================
# PhoenixKey-Server — All-in-one stack (dev + prod cùng 1 file)
#
# Services: postgres + redis + vault (self-host) + vault-seed + app
#
# Khác biệt dev vs prod = giá trị trong .env (KHÔNG có file compose.prod riêng).
# Production: copy .env.example → .env, điền giá trị thật, chmod 600.
#
# Lệnh:
#   cp .env.example .env && chmod 600 .env   # 1 lần
#   docker compose up -d --build             # start
#   docker compose logs -f app               # tail
#   docker compose down                      # stop (giữ data)
#   docker compose down -v                   # wipe data
#
# ⚠ Vault dev mode (inmem storage) — restart container = wipe secrets.
#   vault-seed daemon tự re-seed mỗi 30s từ FEE_WALLET_MNEMONIC + JWT_SECRET_BASE64
#   trong .env. Đảm bảo cả 2 env này được set cho production.
# ============================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  # ──────────────────────────────────────────────────────────
  # PostgreSQL 16 — ACID Database cho PhoenixKey
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: phoenixkey-server-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-phoenixkey}
      POSTGRES_USER: ${DB_USERNAME:-phoenixkey}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      TZ: UTC
    # Container port luôn 5432; host port lấy từ DB_PORT (mặc định 5432).
    # Bind 127.0.0.1 — prod dùng managed DB nên không xài stack này.
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-phoenixkey} -d ${POSTGRES_DB:-phoenixkey}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c max_connections=${POSTGRES_MAX_CONNECTIONS:-100}
        -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}
        -c effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-512MB}
        -c maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}
        -c work_mem=${POSTGRES_WORK_MEM:-16MB}
        -c log_min_duration_statement=${POSTGRES_LOG_MIN_DURATION:-200ms}
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEM_LIMIT:-2G}
    logging: *default-logging

  # ──────────────────────────────────────────────────────────
  # Redis 7 — Cache cho Session, Rate Limit, Sign-Request, Challenge
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: phoenixkey-server-redis
    restart: unless-stopped
    environment:
      TZ: UTC
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
        --save 900 1
        --save 300 10
        --maxmemory ${REDIS_MAXMEMORY:-256mb}
        --maxmemory-policy allkeys-lru
        --appendonly no
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG" ]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM_LIMIT:-512M}
    logging: *default-logging

  # ──────────────────────────────────────────────────────────
  # HashiCorp Vault — self-host KMS (dev mode, inmem storage)
  #
  # ⚠ Storage: inmem — RESTART CONTAINER = MẤT TOÀN BỘ SECRETS.
  #   vault-seed daemon (service dưới) tự re-seed từ env mỗi khi phát hiện wipe,
  #   nên app vẫn vận hành liên tục — secrets gốc nằm trong .env.
  #
  # Layout chuẩn (KV v2 mounted at `secret/`):
  #   secret/phoenixkey/fee-wallet/mnemonic   { "words": [...] }
  #   secret/phoenixkey/jwt/secret            { "key": "<base64>" }
  #   secret/phoenixkey/fcm/service-account   { "json": "..." }     (optional, Phase H+)
  #   secret/phoenixkey/apns/auth-key         { "key": "..." }       (optional, Phase H+)
  #
  # Migrate sang HCP Vault sau (khi cần managed): comment block này +
  # vault-seed, đổi VAULT_ADDR/VAULT_TOKEN/VAULT_NAMESPACE trong .env.
  # ──────────────────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.17
    container_name: phoenixkey-server-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      # Hardcoded — Vault dev mode reject prefix hvs.* (reserved cho HCP).
      # App phải set VAULT_TOKEN=phoenixkey-dev-token trong .env để match.
      VAULT_DEV_ROOT_TOKEN_ID: phoenixkey-dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "127.0.0.1:${VAULT_PORT:-8200}:8200"
    healthcheck:
      # vault CLI có sẵn (image entrypoint). Exit 0 = initialized + unsealed.
      # wget không có trong image alpine slim này.
      test: [ "CMD-SHELL", "VAULT_ADDR=http://localhost:8200 vault status > /dev/null 2>&1" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
    logging: *default-logging

  # ──────────────────────────────────────────────────────────
  # Vault auto-seeder watchdog — chạy daemon, poll mỗi 30s.
  # Tự re-seed nếu vault inmem bị wipe (container restart, laptop sleep, v.v).
  # Fee-wallet mnemonic idempotent: giữ nguyên giữa các lần seed (ví không đổi).
  # ──────────────────────────────────────────────────────────
  vault-seed:
    image: hashicorp/vault:1.17
    container_name: phoenixkey-server-vault-seed
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: phoenixkey-dev-token
      BLOCKFROST_API_KEY: ${BLOCKFROST_API_KEY:-}
      # Override dummy mnemonic — set trong .env để dùng wallet riêng (./tools/keygen wallet)
      FEE_WALLET_MNEMONIC: ${FEE_WALLET_MNEMONIC:-}
      # PROD: BẮT BUỘC set để JWT secret persist qua Vault inmem wipe (xem .env.example).
      # Bỏ qua → mỗi container restart sinh JWT key mới → user phải login lại.
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64:-}
    volumes:
      - ./infrastructure/vault/seed-dev.sh:/seed.sh:ro
    entrypoint: [ "sh", "/seed.sh" ]
    restart: unless-stopped
    logging: *default-logging
  # ──────────────────────────────────────────────────────────
  # Spring Boot App — PhoenixKey-Server
  # Port 8080: API (context-path /api/v1) + Actuator (/api/v1/actuator/*)
  # # ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phoenixkey-server-spring-app
    restart: unless-stopped
    ports:
      - "${APP_BIND:-0.0.0.0}:${APP_PORT:-8084}:8080"
    env_file:
      - path: .env
        required: true
    environment:
      # Override: trong Docker network, app connect tới container PORT NỘI BỘ
      # (luôn cố định) qua service name DNS — bỏ qua DB_PORT/REDIS_PORT/VAULT_PORT
      # trong .env (những biến đó CHỈ dùng cho host-port mapping ở block ports
      # phía trên, để truy cập từ máy host).
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      VAULT_ADDR: http://vault:8200
      CARDANO_NETWORK: ${CARDANO_NETWORK:-preprod}
      TZ: UTC
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/actuator/health | grep -q UP || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: ${APP_MEM_LIMIT:-2G}
    logging: *default-logging
  # ──────────────────────────────────────────────────────────
  # Persistent Volumes
  # ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ──────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────
networks:
  default:
    name: phoenixkey-server-network
    driver: bridge
