# Application config for testnet profile.
# Merge into existing src/main/resources/application.yml or
# create as src/main/resources/application-testnet.yml

spring:
  application:
    name: phoenixkey-server
  profiles:
    active: testnet
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    password: ${REDIS_PASSWORD}

server:
  port: 8080
  servlet:
    context-path: /api/v1

phoenixkey:
  cors:
    origins: ${PHOENIXKEY_CORS_ORIGINS}
  challenge:
    ttl-seconds: ${PHOENIXKEY_CHALLENGE_TTL_SECONDS:300}
  session:
    ttl-seconds: ${PHOENIXKEY_SESSION_TTL_SECONDS:86400}
  linked-device:
    ttl-seconds: ${PHOENIXKEY_LINKED_DEVICE_TTL_SECONDS:2592000}

  cardano:
    network: ${CARDANO_NETWORK:preprod}
    blockfrost-api-key: ${BLOCKFROST_API_KEY}
    taad-script-hash: ${PHOENIXKEY_CARDANO_TAAD_SCRIPT_HASH:}
    taad-script-address: ${PHOENIXKEY_CARDANO_TAAD_SCRIPT_ADDRESS:}
    taad-script-cbor-hex: ${PHOENIXKEY_CARDANO_TAAD_SCRIPT_CBOR_HEX:}
    recovery-script-hash: ${PHOENIXKEY_CARDANO_RECOVERY_SCRIPT_HASH:}
    lamp-policy-id: ${PHOENIXKEY_CARDANO_LAMP_POLICY_ID:}
    lamp-asset-name-hex: ${PHOENIXKEY_CARDANO_LAMP_ASSET_NAME_HEX:4c414d50}
    magic-policy-id: ${PHOENIXKEY_CARDANO_MAGIC_POLICY_ID:}
    magic-asset-name-hex: ${PHOENIXKEY_CARDANO_MAGIC_ASSET_NAME_HEX:4d41474943}
    magic-script-cbor-hex: ${PHOENIXKEY_CARDANO_MAGIC_SCRIPT_CBOR_HEX:}

  magic:
    rate-per-lamp-per-slot: ${PHOENIXKEY_MAGIC_RATE_PER_LAMP_PER_SLOT:0.0001}
    min-claim-amount: ${PHOENIXKEY_MAGIC_MIN_CLAIM_AMOUNT:1}

  activation:
    amount-vnd: ${PHOENIXKEY_ACTIVATION_AMOUNT_VND:200000}
    amount-lamp: ${PHOENIXKEY_ACTIVATION_AMOUNT_LAMP:1001}
    amount-lovelace: ${PHOENIXKEY_ACTIVATION_AMOUNT_LOVELACE:10000000}
    ttl-minutes: ${PHOENIXKEY_ACTIVATION_TTL_MINUTES:15}
    payment-qr-base: ${PHOENIXKEY_ACTIVATION_PAYMENT_QR_BASE:https://pay.aladin.work/qr}
    admin-token: ${PHOENIXKEY_ACTIVATION_ADMIN_TOKEN}

  genie:
    min-balance-lamp: ${PHOENIXKEY_GENIE_MIN_BALANCE_LAMP:1001}
    min-balance-lovelace: ${PHOENIXKEY_GENIE_MIN_BALANCE_LOVELACE:10000000}
    max-concurrent: ${PHOENIXKEY_GENIE_MAX_CONCURRENT:3}
    offline-after-minutes: ${PHOENIXKEY_GENIE_OFFLINE_AFTER_MINUTES:5}

  recovery:
    timelock-slots: ${PHOENIXKEY_RECOVERY_TIMELOCK_SLOTS:3600}
    min-guardian-sigs: ${PHOENIXKEY_RECOVERY_MIN_GUARDIAN_SIGS:2}
    collateral-lovelace: ${PHOENIXKEY_RECOVERY_COLLATERAL_LOVELACE:50000000}

  push:
    fcm:
      enabled: ${PHOENIXKEY_PUSH_FCM_ENABLED:false}
    apns:
      enabled: ${PHOENIXKEY_PUSH_APNS_ENABLED:false}
      team-id: ${PHOENIXKEY_PUSH_APNS_TEAM_ID:}
      key-id: ${PHOENIXKEY_PUSH_APNS_KEY_ID:}
      bundle-id: ${PHOENIXKEY_PUSH_APNS_BUNDLE_ID:com.taad.enclave}
      production: ${PHOENIXKEY_PUSH_APNS_PRODUCTION:false}

  indexer:
    enabled: ${PHOENIXKEY_INDEXER_ENABLED:false}
    poll-interval-ms: ${PHOENIXKEY_INDEXER_POLL_INTERVAL_MS:20000}

  proofchat:
    base-url: ${PHOENIXKEY_PROOFCHAT_BASE_URL:}
    api-key: ${PHOENIXKEY_PROOFCHAT_API_KEY:}
    session-ttl-minutes: ${PHOENIXKEY_PROOFCHAT_SESSION_TTL_MINUTES:30}

  vault:
    addr: ${VAULT_ADDR}
    token: ${VAULT_TOKEN}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.magiclamp.phoenixkey_db: INFO
    com.bloxbean.cardano: WARN
