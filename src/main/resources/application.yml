spring:
  application:
    name: phoenixkey-db

  datasource:
    url: jdbc:postgresql://localhost:5432/phoenixkey
    username: ${DB_USERNAME:phoenixkey}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate # Flyway quản lý schema, JPA chỉ validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

# HashiCorp Vault config
# SERVER_PEPPER sẽ được inject vào spring.config.import từ Vault
# KHÔNG bao giờ hardcode pepper ở đây
spring.config.import: "optional:vault://"

vault:
  uri: ${VAULT_ADDR:http://localhost:8200}
  authentication: TOKEN
  token: ${VAULT_TOKEN:}
  kv:
    enabled: true
    backend: secret
    default-context: phoenixkey

# App-specific config
phoenixkey:
  # Pepper được đọc từ Vault tại runtime, inject qua VaultConfig
  # pepper: (không được khai báo ở đây)
  otp:
    ttl-seconds: 300 # OTP hết hạn sau 5 phút
    max-attempts: 5
  session:
    ttl-seconds: 86400 # Session 24 giờ
  rate-limit:
    otp-per-hour: 5 # Tối đa 5 lần gửi OTP / IP / giờ
    ttl-seconds: 3600

server:
  port: 8080
  servlet:
    context-path: /api/v1

logging:
  level:
    com.magiclamp.phoenixkey: INFO
    org.springframework.security: WARN
