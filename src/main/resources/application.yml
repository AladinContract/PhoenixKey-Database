spring:
  application:
    name: phoenixkey-server

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/phoenixkey
    username: ${DB_USERNAME:phoenixkey}
    password: ${DB_PASSWORD:phoenixkey_dev_password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate # Flyway quản lý schema, JPA chỉ validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  # ──────────────────────────────────────────────────────────
  # DevTools — hot reload (chỉ active khi chạy từ IDE / mvn spring-boot:run)
  # Tự bị disable khi chạy từ JAR/Docker production
  # ──────────────────────────────────────────────────────────
  devtools:
    restart:
      enabled: true
      poll-interval: 2s
      quiet-period: 1s
    livereload:
      enabled: true
      port: 35729

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  cloud:
    vault:
      enabled: ${VAULT_ENABLED:true}
      uri: ${VAULT_ADDR:http://localhost:8200}
      token: ${VAULT_TOKEN:phoenixkey-dev-token}
      namespace: ${VAULT_NAMESPACE:}

# ──────────────────────────────────────────────────────────
# PhoenixKey Config
#
# Secrets (fee-wallet mnemonic, JWT secret, FCM/APNs creds) được load từ
# HashiCorp Vault qua VaultSecretService. Layout chuẩn:
#   secret/phoenixkey/fee-wallet/mnemonic   { "words": [...] }
#   secret/phoenixkey/jwt/secret            { "key": "<base64>" }
#   secret/phoenixkey/fcm/service-account   { "json": "..." }
#   secret/phoenixkey/apns/auth-key         { "key": "...", "keyId": "...", "teamId": "..." }
#
# Env bắt buộc:
#   VAULT_ADDR: Vault URI (dev: http://localhost:8200, prod: HCP URL)
#   VAULT_TOKEN: Vault token
#   VAULT_NAMESPACE: chỉ cần cho HCP Vault
# Dev fallback (chỉ khi VAULT_ENABLED=false):
#   FEE_WALLET_MNEMONIC, PHOENIXKEY_JWT_SECRET
# ──────────────────────────────────────────────────────────
phoenixkey:
  session:
    ttl-seconds: 86400
  challenge:
    ttl-seconds: 300              # QR challenge TTL (spec §6.3)
  sign-request:
    ttl-seconds: 120              # Sign request TTL (spec §2.4)
  rate-limit:
    ttl-seconds: 3600
  cardano:
    network: ${CARDANO_NETWORK:preprod}
    blockfrost-api-key: ${BLOCKFROST_API_KEY:}
    confirm-timeout-ms: 120000
    # Fee wallet mnemonic load từ Vault tại secret/phoenixkey/fee-wallet/mnemonic
    # FeeWalletService gọi vaultSecretService.getFeeWalletMnemonic() trong @PostConstruct.

server:
  port: 8080
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.magiclamp.phoenixkey: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
