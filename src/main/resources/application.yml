spring:
  application:
    name: phoenixkey-db

  datasource:
    url: jdbc:postgresql://localhost:5432/phoenixkey
    username: ${DB_USERNAME:phoenixkey}
    password: ${DB_PASSWORD:phoenixkey_dev_password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate # Flyway quản lý schema, JPA chỉ validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  cloud:
    vault:
      enabled: ${VAULT_ENABLED:false}
      uri: ${VAULT_ADDR:http://localhost:8200}
      authentication: TOKEN
      token: ${VAULT_TOKEN:phoenixkey-dev-token}
      kv:
        enabled: true
        backend: secret
        default-context: phoenixkey

# ──────────────────────────────────────────────────────────
# PhoenixKey Config
#
# PEPPER:
#   Dev: Giá trị mặc định trong file này (chỉ dùng local)
#   Prod: Đọc từ HashiCorp Vault tại secret/phoenixkey/server_pepper
#         Set VAULT_ENABLED=true và VAULT_TOKEN khi deploy lên server
# ──────────────────────────────────────────────────────────
phoenixkey:
  # Pepper cho Blind Index — DEV ONLY
  # Prod: Vault tự inject qua spring.cloud.vault
  pepper: ${SERVER_PEPPER:dev-pepper-for-local-testing-only-32bytes}
  pepper-version: ${PEPPER_VERSION:1}
  otp:
    ttl-seconds: 300
    max-attempts: 5
  session:
    ttl-seconds: 86400
  rate-limit:
    otp-per-hour: 5
    ttl-seconds: 3600

server:
  port: 8080
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.magiclamp.phoenixkey: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
