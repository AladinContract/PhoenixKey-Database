spring:
  application:
    name: phoenixkey-db

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/phoenixkey
    username: ${DB_USERNAME:phoenixkey}
    password: ${DB_PASSWORD:phoenixkey_dev_password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate # Flyway quản lý schema, JPA chỉ validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  cloud:
    vault:
      enabled: ${VAULT_ENABLED:true}
      uri: ${VAULT_ADDR:http://localhost:8200}
      token: ${VAULT_TOKEN:phoenixkey-dev-token}
      namespace: ${VAULT_NAMESPACE:}

# ──────────────────────────────────────────────────────────
# PhoenixKey Config
#
# PEPPER:
#   Pepper được đọc từ HashiCorp Vault tại secret/data/phoenixkey/pepper
#   Vault KV v2: bao gồm current_version + tất cả pepper cũ (multi-version)
#
# Env:
#   VAULT_ADDR: Vault URI (http://localhost:8200 local, https://... HCP/prod)
#   VAULT_TOKEN: Vault token (bắt buộc)
#   VAULT_NAMESPACE: HCP Vault namespace (không bắt buộc)
# ──────────────────────────────────────────────────────────
phoenixkey:
  # Pepper được đọc từ HashiCorp Vault tại secret/phoenixkey/pepper
  # Bao gồm current_version + tất cả pepper cũ (multi-version)
  # Không còn fallback config ở đây
  otp:
    ttl-seconds: 300
    max-attempts: 5
  session:
    ttl-seconds: 86400
  rate-limit:
    otp-per-hour: 5
    ttl-seconds: 3600

server:
  port: 8080
  servlet:
    context-path: /api/v1

management:
  server:
    port: 8081          # Tách Actuator ra port riêng — không bị context-path /api/v1 ảnh hưởng
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.magiclamp.phoenixkey: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
